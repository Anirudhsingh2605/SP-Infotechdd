<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'SP Infotech | Professional IT Services'}"></title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="SP Infotech is a premium IT company providing cutting-edge solutions in Software Development, Shopify Stores, QA Testing, UI/UX Design, and SEO Services.">
    <meta name="keywords" content="IT Services, Software Development, Java Spring Boot, Shopify Customization, Automation Testing, SEO, Web Development, SP Infotech">
    <meta name="author" content="SP Infotech">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" th:content="${title != null ? title : 'SP Infotech'}">
    <meta property="og:description" content="Empowering businesses with custom software development, eCommerce solutions, and digital marketing.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.spinfotech.com">
    <meta property="og:image" content="/images/og-image.jpg">
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- JSON-LD Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ITCompany",
      "name": "SP Infotech",
      "url": "https://www.spinfotech.com",
      "logo": "https://www.spinfotech.com/images/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-123-456-7890",
        "contactType": "customer service"
      }
    }
    </script>
</head>
<body>
</body>
</html>
