<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Manage Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px; display: block; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar flex-shrink-0 p-0" style="width: 250px;">
            <div class="p-3 text-center border-bottom border-secondary">
                <h4 class="m-0">SP Admin</h4>
            </div>
            <div class="mt-3">
                <a th:href="@{/admin}"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a th:href="@{/admin/enquiries}"><i class="fas fa-envelope me-2"></i> View Enquiries</a>
                <a th:href="@{/admin/settings}"><i class="fas fa-cog me-2"></i> Site Settings</a>
                <a th:href="@{/admin/jobs}" class="active"><i class="fas fa-briefcase me-2"></i> Manage Jobs</a>
                <a th:href="@{/admin/credentials}"><i class="fas fa-user-lock me-2"></i> Credentials</a>
                <a th:href="@{/}" target="_blank"><i class="fas fa-external-link-alt me-2"></i> View Website</a>
                
                <form th:action="@{/logout}" method="post" class="mt-5 px-3">
                    <button type="submit" class="btn btn-danger w-100"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Manage Jobs</h2>
                <a th:href="@{/admin/jobs/new}" class="btn btn-success"><i class="fas fa-plus"></i> Add New Job</a>
            </div>
            
            <div th:if="${successMessage}" class="alert alert-success">
                <span th:text="${successMessage}"></span>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Location</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Date Posted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="job : ${jobs}">
                                <td th:text="${job.id}"></td>
                                <td th:text="${job.title}" class="fw-bold"></td>
                                <td th:text="${job.location}"></td>
                                <td th:text="${job.jobType}"></td>
                                <td>
                                    <span th:if="${job.active}" class="badge bg-success">Active</span>
                                    <span th:unless="${job.active}" class="badge bg-secondary">Hidden</span>
                                </td>
                                <td th:text="${job.postedDate}"></td>
                                <td>
                                    <a th:href="@{/admin/jobs/edit/{id}(id=${job.id})}" class="btn btn-sm btn-primary"><i class="fas fa-edit"></i> Edit</a>
                                    <a th:href="@{/admin/jobs/delete/{id}(id=${job.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this job?');"><i class="fas fa-trash"></i> Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(jobs)}">
                                <td colspan="7" class="text-center text-muted py-4">No jobs found. Click "Add New Job" to create one.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
