<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Job Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px; display: block; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar flex-shrink-0 p-0" style="width: 250px;">
            <div class="p-3 text-center border-bottom border-secondary">
                <h4 class="m-0">SP Admin</h4>
            </div>
            <div class="mt-3">
                <a th:href="@{/admin}"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a th:href="@{/admin/enquiries}"><i class="fas fa-envelope me-2"></i> View Enquiries</a>
                <a th:href="@{/admin/settings}"><i class="fas fa-cog me-2"></i> Site Settings</a>
                <a th:href="@{/admin/jobs}" class="active"><i class="fas fa-briefcase me-2"></i> Manage Jobs</a>
                <a th:href="@{/admin/credentials}"><i class="fas fa-user-lock me-2"></i> Credentials</a>
                <a th:href="@{/}" target="_blank"><i class="fas fa-external-link-alt me-2"></i> View Website</a>
                
                <form th:action="@{/logout}" method="post" class="mt-5 px-3">
                    <button type="submit" class="btn btn-danger w-100"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${job.id == null ? 'Add New Job' : 'Edit Job'}">Job Form</h2>
            
            <div class="card shadow-sm" style="max-width: 800px;">
                <div class="card-body">
                    <form th:action="@{/admin/jobs/save}" method="post" th:object="${job}">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{postedDate}">
                        
                        <div class="mb-3">
                            <label class="form-label">Job Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{title}" required placeholder="e.g. Full Stack Developer">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Location <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{location}" required placeholder="e.g. Jaipur / Remote">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Job Type <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{jobType}" required>
                                    <option value="Full Time">Full Time</option>
                                    <option value="Part Time">Part Time</option>
                                    <option value="Contract">Contract</option>
                                    <option value="Freelance">Freelance</option>
                                    <option value="Internship">Internship</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Job Description <span class="text-danger">*</span></label>
                            <textarea class="form-control" th:field="*{description}" rows="6" required placeholder="Describe the responsibilities and requirements..."></textarea>
                        </div>
                        
                        <div class="mb-4 form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeSwitch">
                            <label class="form-check-label" for="activeSwitch">Active (Show on Careers page)</label>
                        </div>
                        
                        <div>
                            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save"></i> Save Job</button>
                            <a th:href="@{/admin/jobs}" class="btn btn-secondary ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
