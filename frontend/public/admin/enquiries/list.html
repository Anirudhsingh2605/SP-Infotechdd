<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">View Enquiries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px; display: block; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar flex-shrink-0 p-0" style="width: 250px;">
            <div class="p-3 text-center border-bottom border-secondary">
                <h4 class="m-0">SP Admin</h4>
            </div>
            <div class="mt-3">
                <a th:href="@{/admin}"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a th:href="@{/admin/enquiries}" class="active"><i class="fas fa-envelope me-2"></i> View Enquiries</a>
                <a th:href="@{/admin/settings}"><i class="fas fa-cog me-2"></i> Site Settings</a>
                <a th:href="@{/admin/jobs}"><i class="fas fa-briefcase me-2"></i> Manage Jobs</a>
                <a th:href="@{/admin/credentials}"><i class="fas fa-user-lock me-2"></i> Credentials</a>
                <a th:href="@{/}" target="_blank"><i class="fas fa-external-link-alt me-2"></i> View Website</a>
                
                <form th:action="@{/logout}" method="post" class="mt-5 px-3">
                    <button type="submit" class="btn btn-danger w-100"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <h2 class="mb-4">All Enquiries & Applications</h2>
            
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Type</th>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Subject/Position</th>
                                <th>Message</th>
                                <th>Resume</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="enq : ${enquiries}">
                                <td>
                                    <span th:if="${enq.type == 'CAREER'}" class="badge bg-primary">Job Application</span>
                                    <span th:if="${enq.type == 'CONTACT'}" class="badge bg-info">Contact Enquiry</span>
                                </td>
                                <td th:text="${#temporals.format(enq.submittedAt, 'dd-MM-yyyy HH:mm')}"></td>
                                <td th:text="${enq.name}" class="fw-bold"></td>
                                <td>
                                    <div><i class="fas fa-envelope text-muted"></i> <span th:text="${enq.email}"></span></div>
                                    <div><i class="fas fa-phone text-muted"></i> <span th:text="${enq.phone}"></span></div>
                                </td>
                                <td th:text="${enq.position}"></td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" 
                                            data-bs-toggle="modal" 
                                            th:data-bs-target="'#msgModal' + ${enq.id}">
                                        View Message
                                    </button>

                                    <!-- Message Modal -->
                                    <div class="modal fade" th:id="'msgModal' + ${enq.id}" tabindex="-1">
                                      <div class="modal-dialog">
                                        <div class="modal-content">
                                          <div class="modal-header">
                                            <h5 class="modal-title">Message from <span th:text="${enq.name}"></span></h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                          </div>
                                          <div class="modal-body">
                                            <p style="white-space: pre-wrap;" th:text="${enq.message}"></p>
                                          </div>
                                          <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                </td>
                                <td>
                                    <a th:if="${enq.resumeFilePath != null}" th:href="@{/admin/enquiries/download/{id}(id=${enq.id})}" class="btn btn-sm btn-success">
                                        <i class="fas fa-download"></i> Download
                                    </a>
                                    <span th:unless="${enq.resumeFilePath != null}" class="text-muted">-</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(enquiries)}">
                                <td colspan="7" class="text-center text-muted py-4">No enquiries found yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
