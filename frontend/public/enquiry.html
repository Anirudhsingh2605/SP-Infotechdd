<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Page Header -->
    <section class="page-header position-relative overflow-hidden pt-5 pb-5 mt-5">
        <div class="blob blob-1" style="top: 10%; left: 5%; opacity: 0.15; width: 300px; height: 300px; background: var(--primary-color); border-radius: 50%; filter: blur(80px);"></div>
        <div class="container position-relative z-1" data-aos="fade-up">
            <div class="text-center mb-4">
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-bold mb-3">🚀 JOIN OUR TEAM</span>
            </div>
            <h1 class="page-title fw-bolder text-center display-4 mb-3">Job <span class="text-gradient">Application</span></h1>
            <p class="lead text-center opacity-75 max-w-700 mx-auto mb-4">Take the next step in your career with SP Infotech.</p>

        </div>
    </section>

    <!-- Application Form Section -->
    <section class="section-padding position-relative pt-4 pb-5">
        <div class="container">
            <!-- Success Message Alert -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-5" role="alert">
                <strong th:text="${successMessage}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row justify-content-center">
                
                <!-- Application Form -->
                <div class="col-lg-8" data-aos="fade-up">
                    <div class="glass-card p-4 p-md-5 border border-light border-opacity-10 shadow-lg rounded-4">
                        <h3 class="mb-4 fw-bold">Submit Your Application</h3>
                        <form th:action="@{/enquiry}" method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label opacity-75 small fw-semibold">Applying For *</label>
                                <input type="text" class="form-control glass-input border-opacity-25" name="position" required id="positionSelect" th:value="${position}" placeholder="e.g. Shopify Developer">
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label opacity-75 small fw-semibold">Full Name *</label>
                                    <input type="text" class="form-control glass-input border-opacity-25" name="name" required placeholder="John Doe">
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label opacity-75 small fw-semibold">Email Address *</label>
                                    <input type="email" class="form-control glass-input border-opacity-25" name="email" required placeholder="john@example.com">
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label opacity-75 small fw-semibold">Phone Number *</label>
                                    <input type="tel" class="form-control glass-input border-opacity-25" name="phone" required placeholder="+91 98765 43210">
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label opacity-75 small fw-semibold">Upload Resume (PDF/DOCX) *</label>
                                    <input type="file" class="form-control glass-input border-opacity-25" name="resumeFile" accept=".pdf,.doc,.docx" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label opacity-75 small fw-semibold">Cover Letter / Message</label>
                                <textarea class="form-control glass-input border-opacity-25" name="message" rows="4" placeholder="Tell us why you are a great fit for this role..."></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill px-5 py-3 fw-bold w-100 hover-lift">
                                Submit Application <i class="fas fa-paper-plane ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Custom Script for Auto-selection (Fallback) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Also check URL params as a fallback in case Thymeleaf model fails
            const urlParams = new URLSearchParams(window.location.search);
            const posParam = urlParams.get('position');
            if (posParam) {
                const select = document.getElementById('positionSelect');
                for(let i = 0; i < select.options.length; i++) {
                    if(select.options[i].value === posParam) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }
        });
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
