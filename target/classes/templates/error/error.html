<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="section-padding bg-light d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="container text-center" data-aos="zoom-in">
            <h1 class="display-1 fw-bold text-danger"><i class="fas fa-exclamation-triangle"></i></h1>
            <h2 class="mb-4" th:text="${statusCode != null ? 'Error ' + statusCode : 'Oops! Something went wrong'}">Oops! Something went wrong</h2>
            <p class="text-muted mb-5">We are experiencing some technical difficulties. Please try again later.</p>
            <a th:href="@{/}" class="btn btn-primary rounded-pill px-5">Back to Home</a>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
