<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container" data-aos="fade-up">
            <h1 class="page-title fw-bold">Contact Us</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Contact</li>
                </ol>
            </nav>
        </div>
    </section>

    <!-- Contact Info & Form -->
    <section class="section-padding bg-white">
        <div class="container">
            <!-- Success Message Alert -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-5" role="alert">
                <strong th:text="${successMessage}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row">
                <!-- Contact Information -->
                <div class="col-lg-5 mb-5 mb-lg-0" data-aos="fade-right">
                    <h2 class="mb-4">Get In Touch</h2>
                    <p class="text-muted mb-5">Have a project in mind or need assistance? Reach out to us via phone, email, or by filling out the form.</p>
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-light p-3 rounded-circle me-3">
                            <i class="fas fa-map-marker-alt text-primary fa-2x"></i>
                        </div>
                        <div>
                            <h5 class="mb-1">Our Office</h5>
                            <p class="text-muted mb-0">123 Tech Boulevard, Innovation City, NY 10001, USA</p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-light p-3 rounded-circle me-3">
                            <i class="fas fa-envelope text-primary fa-2x"></i>
                        </div>
                        <div>
                            <h5 class="mb-1">Email Us</h5>
                            <p class="text-muted mb-0"><a href="mailto:livehitesh126@gmail.com" class="text-muted text-decoration-none hover-primary">livehitesh126@gmail.com</a></p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-light p-3 rounded-circle me-3">
                            <i class="fas fa-phone-alt text-primary fa-2x"></i>
                        </div>
                        <div>
                            <h5 class="mb-1">Call Us</h5>
                            <p class="text-muted mb-0"><a href="tel:+917898091357" class="text-muted text-decoration-none hover-primary">+91 78980 91357</a></p>
                        </div>
                    </div>
                </div>
                
                <!-- Contact Form -->
                <div class="col-lg-7" data-aos="fade-left">
                    <div class="glass-card p-5 border shadow-sm" style="background: rgba(255,255,255,0.9);">
                        <form th:action="@{/contact}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted small">Your Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted small">Your Email</label>
                                    <input type="email" class="form-control" name="email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Subject</label>
                                <input type="text" class="form-control" name="subject" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Message</label>
                                <textarea class="form-control" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Google Map -->
    <section class="p-0">
        <!-- Placeholder map -->
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.15830869428!2d-74.119763973046!3d40.69766374874431!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2s!4v1680000000000!5m2!1sen!2s" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
